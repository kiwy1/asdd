# OpenHAB 8 CI/CD Assignment Stack
# Всі Items — віртуальні з симуляцією через virtual-sim сервіс

services:
  openhab:
    image: openhab/openhab:4.3.10
    container_name: openhab8-openhab
    restart: unless-stopped
    ports:
      - "${OPENHAB_HTTP_PORT:-9080}:8080"
      - "${OPENHAB_HTTPS_PORT:-9443}:8443"
    volumes:
      - ./openhab/conf:/openhab/conf
      - openhab_userdata:/openhab/userdata
    environment:
      TZ: ${TZ:-Europe/Kyiv}
      CRYPTO_POLICY: unlimited
      OPENHAB_HTTP_PORT: "8080"
      OPENHAB_HTTPS_PORT: "8443"
      JAVA_OPTS: "-Duser.timezone=${TZ:-Europe/Kyiv} -Xmx512m -Xms128m"
      USER_ID: "9001"
      GROUP_ID: "9001"
    networks:
      - openhab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/rest/items?limit=1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  virtual-sim:
    build:
      context: .
      dockerfile: Dockerfile.sim
    container_name: openhab8-virtual-sim
    restart: unless-stopped
    depends_on:
      openhab:
        condition: service_healthy
    environment:
      OPENHAB_URL: http://openhab:8080
      PUSH_INTERVAL: ${SIM_INTERVAL:-15}
    networks:
      - openhab-net

volumes:
  openhab_userdata:
    driver: local

networks:
  openhab-net:
    driver: bridge
    name: openhab8-net
