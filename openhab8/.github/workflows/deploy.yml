# Deployment — deploy config / optional rolling update
name: Deploy

on:
  workflow_run:
    workflows: [Validate, Test, Build]
    types: [completed]
    branches: [main]
  workflow_dispatch:

jobs:
  check-success:
    name: Check pipeline success
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    outputs:
      should_deploy: ${{ steps.check.outputs.should_deploy }}
    steps:
      - name: Check other workflows
        id: check
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          elif [ "${{ github.event.workflow_run.conclusion }}" = "success" ]; then
            echo "should_deploy=true" >> $GITHUB_OUTPUT
          else
            echo "should_deploy=false" >> $GITHUB_OUTPUT
          fi

  deploy-artifacts:
    name: Deploy artifacts
    runs-on: ubuntu-latest
    needs: check-success
    if: needs.check-success.outputs.should_deploy == 'true'
    steps:
      - uses: actions/checkout@v4

      - name: Upload config artifact
        uses: actions/upload-artifact@v4
        with:
          name: openhab-conf-${{ github.sha }}
          path: openhab/conf/
          retention-days: 30

      - name: Summary
        run: |
          echo "## Deployment summary" >> $GITHUB_STEP_SUMMARY
          echo "- Config artifact: \`openhab-conf-${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- Image: \`ghcr.io/${{ github.repository_owner }}/openhab8-virtual-sim:latest\` (if build passed)" >> $GITHUB_STEP_SUMMARY
