# Automated Testing — Unit, Integration, Config, Regression
name: Test

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  unit-tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run unit tests
        run: pytest tests/unit -v --tb=short --cov=scripts --cov=openhab/conf --cov-report=xml --cov-report=term-missing --cov-fail-under=0 || true

      - name: Upload coverage
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: coverage.xml
          fail_ci_if_error: false

  integration-tests:
    name: Integration tests
    runs-on: ubuntu-latest
    needs: []
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Start OpenHAB stack
        run: |
          docker compose up -d openhab
          echo "Waiting for OpenHAB..."
          timeout 120 bash -c 'until curl -sf http://localhost:8080/rest/items?limit=1; do sleep 5; done' || true

      - name: Run integration tests
        run: |
          pip install requests pytest
          pytest tests/integration -v --tb=short
        env:
          OPENHAB_URL: http://localhost:8080

      - name: Stop stack
        if: always()
        run: docker compose down

  config-tests:
    name: Configuration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run config tests
        run: pytest tests/unit/test_config.py -v --tb=short
