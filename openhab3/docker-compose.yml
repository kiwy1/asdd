# OpenHAB 3 - InfluxDB Integration Stack
# Вариант 1: OpenHAB → InfluxDB → Grafana
# Всі Items віртуальні (оновлюються virtual-sim)

services:
  openhab:
    image: openhab/openhab:5.1.3
    container_name: oh3-openhab
    restart: always
    ports:
      - "8082:8080"    # UI: http://localhost:8082
      - "8445:8443"
    volumes:
      - ./openhab_conf:/openhab/conf
      - openhab-userdata:/openhab/userdata
    environment:
      CRYPTO_POLICY: "unlimited"
      OPENHAB_HTTP_PORT: "8080"
      OPENHAB_HTTPS_PORT: "8443"
      TZ: "Europe/Kyiv"
      JAVA_OPTS: "-Dopenhab.userdata=/openhab/userdata"
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - iot-net

  influxdb:
    image: influxdb:2.7
    container_name: oh3-influxdb
    restart: always
    ports:
      - "8086:8086"
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: admin
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUXDB_ADMIN_PASSWORD:-openhab-influx-admin}
      DOCKER_INFLUXDB_INIT_ORG: openhab
      DOCKER_INFLUXDB_INIT_BUCKET: openhab
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUXDB_TOKEN:-openhab-influx-token-change-me}
      DOCKER_INFLUXDB_INIT_RETENTION: 52w
    volumes:
      - influxdb-data:/var/lib/influxdb2
    healthcheck:
      test: ["CMD", "influx", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - iot-net

  grafana:
    image: grafana/grafana:11.3.0
    container_name: oh3-grafana
    restart: always
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_HTTP_PORT: 3000
      GF_INSTALL_PLUGINS: ""
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning
      - ./grafana/dashboards:/var/lib/grafana/dashboards
    depends_on:
      - influxdb
    networks:
      - iot-net

  # Setup: create InfluxDB buckets + tasks (runs once, then exits)
  influxdb-setup:
    image: influxdb:2.7
    container_name: oh3-influxdb-setup
    restart: "no"
    environment:
      INFLUXDB_TOKEN: ${INFLUXDB_TOKEN:-openhab-influx-token-change-me}
      INFLUXDB_URL: http://influxdb:8086
    volumes:
      - ./influxdb/tasks:/tasks
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        echo "Waiting for InfluxDB..."
        for i in $$(seq 1 30); do
          wget -q -O- $${INFLUXDB_URL}/health 2>/dev/null && break
          sleep 2
        done
        sleep 5
        export INFLUX_TOKEN=$${INFLUXDB_TOKEN}
        export INFLUX_HOST=$${INFLUXDB_URL}
        influx bucket create -n openhab_hourly -r 90d -o openhab 2>/dev/null || true
        influx bucket create -n openhab_daily -r 365d -o openhab 2>/dev/null || true
        influx bucket create -n openhab_weekly -r 0 -o openhab 2>/dev/null || true
        for f in /tasks/*.flux; do influx task create -f $$f 2>/dev/null || true; done
        echo "InfluxDB setup done"
    depends_on:
      influxdb:
        condition: service_healthy
    networks:
      - iot-net

  # Віртуальний симулятор - оновлює всі Items (температура, вологість, світло, power тощо)
  virtual-sim:
    build: ./virtual-sim
    container_name: oh3-virtual-sim
    restart: always
    environment:
      OPENHAB_URL: "http://oh3-openhab:8080"
      PUSH_INTERVAL: "10"
    depends_on:
      - openhab
    networks:
      - iot-net

volumes:
  openhab-userdata:
  influxdb-data:
  grafana-data:

networks:
  iot-net:
    driver: bridge
