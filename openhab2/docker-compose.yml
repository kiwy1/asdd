# Universal Device Model - OpenHAB IoT Platform
# Variant 6: Multi-protocol support (MQTT, HTTP, CoAP)

services:
  openhab:
    image: openhab/openhab:5.1.3
    container_name: udm-openhab
    restart: always
    # macOS/Windows: use ports; Linux: can use network_mode: host
    ports:
      - "8081:8080"    # UI: http://localhost:8081 (change if 8080 free)
      - "8444:8443"
      - "8102:8101"
      - "5008:5007"
    volumes:
      - ./openhab_conf:/openhab/conf
      - ./openhab_userdata:/openhab/userdata
    environment:
      CRYPTO_POLICY: "unlimited"
      OPENHAB_HTTP_PORT: "8080"
      OPENHAB_HTTPS_PORT: "8443"
      TZ: "Europe/Kyiv"
      JAVA_OPTS: "-Dopenhab.userdata=/openhab/userdata"
    depends_on:
      - mosquitto
    networks:
      - iot-network

  mosquitto:
    image: eclipse-mosquitto:2
    container_name: udm-mosquitto
    hostname: mosquitto
    restart: always
    ports:
      - "1884:1883"    # 1884 to avoid conflict with existing Mosquitto
      - "9002:9001"
    volumes:
      - ./mosquitto/config:/mosquitto/config
      - ./mosquitto/data:/mosquitto/data
      - ./mosquitto/log:/mosquitto/log
    networks:
      - iot-network

  # CoAP-MQTT Bridge: enables CoAP protocol support for OpenHAB
  coap-bridge:
    build: ./coap-bridge
    container_name: coap-mqtt-bridge
    restart: always
    ports:
      - "5683:5683/udp"
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      COAP_PORT: "5683"
    depends_on:
      - mosquitto
    networks:
      - iot-network

  # MQTT Virtual Device Simulator - publishes sensor/switch/discovery to MQTT
  mqtt-virtual-sim:
    build: ./mqtt-virtual-sim
    container_name: mqtt-virtual-sim
    restart: always
    environment:
      MQTT_BROKER: mosquitto
      MQTT_PORT: "1883"
      SIM_INTERVAL: "5"
    depends_on:
      - mosquitto
    networks:
      - iot-network

  # CoAP Virtual Device Simulator - sends discovery/data via CoAP to bridge
  coap-virtual-sim:
    build: ./coap-virtual-sim
    container_name: coap-virtual-sim
    restart: always
    environment:
      COAP_HOST: coap-bridge
      COAP_PORT: "5683"
      SIM_INTERVAL: "20"
    depends_on:
      - coap-bridge
    networks:
      - iot-network

  # OpenHAB Pusher - pushes data to Items via REST API (ensures sitemap shows values)
  openhab-pusher:
    build: ./openhab-pusher
    container_name: openhab-pusher
    restart: always
    environment:
      OPENHAB_URL: "http://udm-openhab:8080"
      HTTP_SIM_URL: "http://http-device-sim:9999"
      PUSH_INTERVAL: "5"
    depends_on:
      - openhab
      - http-device-sim
    networks:
      - iot-network

  # HTTP Virtual Device Simulator (dynamic values, sensor drift)
  http-device-sim:
    build: ./http-device-sim
    container_name: http-device-sim
    restart: always
    ports:
      - "9999:9999"
    environment:
      OPENHAB_URL: "http://udm-openhab:8080"
    networks:
      - iot-network

networks:
  iot-network:
    driver: bridge
