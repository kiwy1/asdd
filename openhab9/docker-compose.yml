# OpenHAB 9 — Практична робота 16.1: PIA для системи моніторингу здоров'я
# Всі Items віртуальні з симуляцією (серцевий ритм, активність, сон, геолокація)

services:
  openhab:
    image: openhab/openhab:4.2.1
    container_name: openhab9-openhab
    restart: unless-stopped
    ports:
      - "${OPENHAB_HTTP_PORT:-8080}:8080"
      - "${OPENHAB_HTTPS_PORT:-8443}:8443"
    volumes:
      - ./openhab/conf:/openhab/conf
      - openhab_userdata:/openhab/userdata
    environment:
      TZ: ${TZ:-Europe/Kyiv}
      CRYPTO_POLICY: unlimited
      OPENHAB_HTTP_PORT: "8080"
      OPENHAB_HTTPS_PORT: "8443"
      JAVA_OPTS: "-Duser.timezone=${TZ:-Europe/Kyiv} -Xmx512m -Xms128m"
      USER_ID: "9001"
      GROUP_ID: "9001"
    networks:
      - openhab-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/rest/items?limit=1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 90s

  virtual-sim:
    build:
      context: .
      dockerfile: Dockerfile.sim
    container_name: openhab9-virtual-sim
    restart: unless-stopped
    depends_on:
      openhab:
        condition: service_healthy
    environment:
      OPENHAB_URL: http://openhab:8080
      PUSH_INTERVAL: ${SIM_INTERVAL:-10}
    networks:
      - openhab-net

volumes:
  openhab_userdata:
    driver: local

networks:
  openhab-net:
    driver: bridge
    name: openhab9-net
